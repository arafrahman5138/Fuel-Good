services:
  db:
    image: pgvector/pgvector:pg16
    container_name: fuelgood-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fuelgood
      POSTGRES_PASSWORD: fuelgood_local
      POSTGRES_DB: fuelgood
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
