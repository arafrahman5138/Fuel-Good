name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: pip install -r requirements.txt
      - name: Compile backend app
        run: python -m compileall app
      - name: Validate production config import
        env:
          ENVIRONMENT: production
          DATABASE_URL: postgresql://user:pass@localhost:5432/wholefoodlabs
          SECRET_KEY: 12345678901234567890123456789012
          CORS_ALLOWED_ORIGINS: https://app.wholefoodlabs.com
          GOOGLE_API_KEY: test-google-api-key
          LLM_PROVIDER: gemini
          RUN_NOTIFICATION_SCHEDULER: false
          RUN_STARTUP_SEEDING: false
          ALLOW_DEV_DB_BOOTSTRAP: false
        run: python -c "from app.config import get_settings; from app.main import _validate_security_settings; s = get_settings(); assert s.environment == 'production'; assert s.secret_key; _validate_security_settings()"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Validate Expo config
        env:
          EXPO_PUBLIC_APP_ENV: production
          EXPO_PUBLIC_RELEASE_CHANNEL: production
          EXPO_PUBLIC_API_URL: https://api.wholefoodlabs.com/api
          EXPO_PUBLIC_GOOGLE_CLIENT_ID: test-google-client-id
          EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: test-google-ios-client-id
          EXPO_PUBLIC_SUPPORT_EMAIL: support@wholefoodlabs.com
          EXPO_PUBLIC_PRIVACY_POLICY_URL: https://wholefoodlabs.com/privacy
          EXPO_PUBLIC_TERMS_URL: https://wholefoodlabs.com/terms
        run: npm run expo:config > /dev/null
