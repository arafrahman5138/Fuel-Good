services:
  - type: web
    name: fuel-good-api-production
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.13.2"
      - key: ENVIRONMENT
        value: production
      - key: RUN_NOTIFICATION_SCHEDULER
        value: "false"
      - key: RUN_STARTUP_SEEDING
        value: "false"
      - key: ALLOW_DEV_DB_BOOTSTRAP
        value: "false"
      - key: LLM_PROVIDER
        value: gemini
      - key: CHAT_MODEL
        value: gemini-2.5-flash
      - key: SCAN_MODEL
        value: gemini-2.5-flash
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: EMBEDDING_DIMENSION
        value: "768"
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: APPLE_BUNDLE_ID
        value: com.fuelgood.app
      - key: SUPPORT_EMAIL
        sync: false
      - key: PRIVACY_POLICY_URL
        sync: false
      - key: TERMS_URL
        sync: false
      - key: SUPPORT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_MEAL_SCANS_BUCKET
        value: meal-scans
      - key: SUPABASE_STORAGE_LABEL_SCANS_BUCKET
        value: label-scans
      - key: SUPABASE_SIGNED_URL_TTL_SECONDS
        value: "3600"
      - key: EXPO_PUSH_ACCESS_TOKEN
        sync: false
      - key: REVENUECAT_SECRET_API_KEY
        sync: false
      - key: REVENUECAT_IOS_API_KEY
        sync: false
      - key: REVENUECAT_WEBHOOK_AUTHORIZATION
        sync: false
      - key: REVENUECAT_ENTITLEMENT_ID
        value: premium
      - key: REVENUECAT_OFFERING_ID
        value: default
      - key: REVENUECAT_MONTHLY_PRODUCT_ID
        value: premium_monthly_999
      - key: REVENUECAT_ANNUAL_PRODUCT_ID
        value: premium_annual_4999
      - key: REVENUECAT_TRIAL_DAYS
        value: "7"
      - key: CHAT_QUOTA_EXEMPT_EMAILS
        value: arahman.usa500@gmail.com
  - type: worker
    name: fuel-good-notifications-production
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: python run_notification_worker.py
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromService:
          name: fuel-good-api-production
          type: web
          envVarKey: DATABASE_URL
      - key: PYTHON_VERSION
        fromService:
          name: fuel-good-api-production
          type: web
          envVarKey: PYTHON_VERSION
      - key: ENVIRONMENT
        value: production
      - key: RUN_NOTIFICATION_SCHEDULER
        value: "true"
      - key: RUN_STARTUP_SEEDING
        value: "false"
      - key: ALLOW_DEV_DB_BOOTSTRAP
        value: "false"
      - key: LLM_PROVIDER
        value: gemini
      - key: CHAT_MODEL
        fromService:
          name: fuel-good-api-production
          type: web
          envVarKey: CHAT_MODEL
      - key: SCAN_MODEL
        fromService:
          name: fuel-good-api-production
          type: web
          envVarKey: SCAN_MODEL
      - key: EMBEDDING_PROVIDER
        fromService:
          name: fuel-good-api-production
