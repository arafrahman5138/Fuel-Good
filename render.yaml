          envVarKey: EMBEDDING_MODEL
      - key: EMBEDDING_DIMENSION
        fromService:
          name: fuel-good-api-production
          type: web
          envVarKey: EMBEDDING_DIMENSION
      - key: SECRET_KEY
        fromService:
          name: fuel-good-api-production
          type: web
          envVarKey: SECRET_KEY
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          name: fuel-good-api-production
          type: web
          envVarKey: CORS_ALLOWED_ORIGINS
      - key: GOOGLE_API_KEY
        fromService:
