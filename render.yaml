# render.yaml – Fuel Good production API
# STATUS: Documentation / Blueprint-ready reference.
# The live Render service (srv-d6rfr3khg0os73a88bl0) was created manually.
# This file is kept in sync with the live dashboard config so it can be
# adopted as a Render Blueprint in the future with minimal drift.
#
# Last synced with live production: 2026-04-06
#
# IMPORTANT – migration behaviour:
#   buildCommand  installs deps only (NO alembic)
#   preDeployCommand runs alembic upgrade heads against the live DB
# This ensures migrations always execute against the real DATABASE_URL
# rather than the ephemeral build environment.
#
# 2026-04-30: switched `head` → `heads` (plural) to match backend/start.sh and
# tolerate prod's alembic_version table having multiple recorded heads from past
# branch divergence (the singular form failed with "Multiple head revisions are
# present"). The mainline migration tree is single-head locally; `heads`
# is a no-op when only one head exists and idempotent when several do.

services:
  - type: web
    name: Fuel Good
    runtime: python
    region: oregon
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    preDeployCommand: "PYTHONPATH=. alembic upgrade heads"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.13.2"
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        sync: false
      - key: ENABLE_STRUCTURED_LOGGING
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: RATE_LIMIT_PER_MINUTE
        sync: false
      - key: AUTH_RATE_LIMIT_PER_MINUTE
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: LLM_PROVIDER
        value: gemini
      - key: CHAT_MODEL
        value: gemini-3.1-flash-lite-preview
      - key: SCAN_MODEL
        value: gemini-3.1-flash-lite-preview
      - key: GEMINI_MODEL
        sync: false
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: EMBEDDING_DIMENSION
        value: "768"
      - key: RUN_STARTUP_SEEDING
        value: "false"
      - key: SYNC_OFFICIAL_MEALS_ON_STARTUP
        value: "true"
      - key: ALLOW_DEV_DB_BOOTSTRAP
        value: "false"
      - key: RUN_NOTIFICATION_SCHEDULER
        value: "false"
      - key: NOTIFICATION_RUNNER_SECRET
        sync: false
      - key: NOTIFICATION_CRON_BATCH_SIZE
        value: "100"
      - key: NOTIFICATION_CRON_USER_LIMIT
        value: "250"
      - key: EXPO_PUSH_ACCESS_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_REPLY_TO
        sync: false
      - key: APPLE_BUNDLE_ID
        value: com.fuelgood.ios
      - key: APP_STORE_MANAGE_SUBSCRIPTIONS_URL
        sync: false
      - key: REVENUECAT_SECRET_API_KEY
        sync: false
      - key: REVENUECAT_IOS_API_KEY
        sync: false
      - key: REVENUECAT_WEBHOOK_AUTHORIZATION
        sync: false
      - key: REVENUECAT_ENTITLEMENT_ID
        value: Fuel Good Premium
      - key: REVENUECAT_OFFERING_ID
        value: default
      - key: REVENUECAT_MONTHLY_PRODUCT_ID
        value: monthly
      - key: REVENUECAT_ANNUAL_PRODUCT_ID
        value: yearly
      - key: REVENUECAT_LIFETIME_PRODUCT_ID
        value: lifetime
      - key: REVENUECAT_TRIAL_DAYS
        value: "7"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_MEAL_SCANS_BUCKET
        value: meal-scans
      - key: SUPABASE_STORAGE_LABEL_SCANS_BUCKET
        value: label-scans
      - key: SUPABASE_SIGNED_URL_TTL_SECONDS
        value: "3600"
      - key: SUPPORT_EMAIL
        sync: false
      - key: PRIVACY_POLICY_URL
        sync: false
      - key: TERMS_URL
        sync: false
      - key: SUPPORT_URL
        sync: false
      - key: CHAT_QUOTA_EXEMPT_EMAILS
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.05"
      - key: SENTRY_PROFILES_SAMPLE_RATE
        value: "0.0"
