services:
  - type: web
    name: fuel-good-api-production
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.13.2"
      - key: ENVIRONMENT
        value: production
      - key: RUN_NOTIFICATION_SCHEDULER
        value: "false"
      - key: NOTIFICATION_RUNNER_SECRET
        sync: false
      - key: NOTIFICATION_CRON_BATCH_SIZE
        value: "100"
      - key: NOTIFICATION_CRON_USER_LIMIT
        value: "250"
      - key: RUN_STARTUP_SEEDING
        value: "false"
      - key: ALLOW_DEV_DB_BOOTSTRAP
        value: "false"
      - key: LLM_PROVIDER
        value: gemini
      - key: CHAT_MODEL
        value: gemini-3.1-flash-lite-preview
      - key: SCAN_MODEL
        value: gemini-3.1-flash-lite-preview
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: EMBEDDING_DIMENSION
        value: "768"
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: APPLE_BUNDLE_ID
        value: com.fuelgood.ios
      - key: SUPPORT_EMAIL
        sync: false
      - key: PRIVACY_POLICY_URL
        sync: false
      - key: TERMS_URL
        sync: false
      - key: SUPPORT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_MEAL_SCANS_BUCKET
        value: meal-scans
      - key: SUPABASE_STORAGE_LABEL_SCANS_BUCKET
        value: label-scans
      - key: SUPABASE_SIGNED_URL_TTL_SECONDS
        value: "3600"
      - key: EXPO_PUSH_ACCESS_TOKEN
        sync: false
      - key: REVENUECAT_SECRET_API_KEY
        sync: false
      - key: REVENUECAT_IOS_API_KEY
        sync: false
      - key: REVENUECAT_WEBHOOK_AUTHORIZATION
        sync: false
      - key: REVENUECAT_ENTITLEMENT_ID
        value: Fuel Good Premium
      - key: REVENUECAT_OFFERING_ID
        value: default
      - key: REVENUECAT_MONTHLY_PRODUCT_ID
        value: monthly
      - key: REVENUECAT_ANNUAL_PRODUCT_ID
        value: yearly
      - key: REVENUECAT_LIFETIME_PRODUCT_ID
        value: lifetime
      - key: REVENUECAT_TRIAL_DAYS
        value: "7"
      - key: CHAT_QUOTA_EXEMPT_EMAILS
        sync: false
