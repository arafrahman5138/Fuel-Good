# TRACK TAB (Chronometer)
# ═══════════════════════════════════
- tapOn:
    text: "Track"
- waitForAnimationToEnd:
    timeout: 5000

# Scroll track tab
- swipe:
    start: "50%, 80%"
    end: "50%, 20%"
    duration: 400
- waitForAnimationToEnd:
    timeout: 1500

# ═══════════════════════════════════
# COACH TAB (Chat/Healthify)
# ═══════════════════════════════════
- tapOn:
    text: "Coach"
- waitForAnimationToEnd:
    timeout: 5000

# ═══════════════════════════════════
# PROFILE TAB
# ═══════════════════════════════════
- openLink: "exp://localhost:8081/(tabs)/profile"
- waitForAnimationToEnd:
    timeout: 5000

# Scroll profile
- swipe:
    start: "50%, 80%"
    end: "50%, 20%"
    duration: 400
- waitForAnimationToEnd:
