appId: host.exp.Exponent
---
# Day 1: Explore the home screen thoroughly

# Open the app
- openLink: "exp://localhost:8081"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: day1_01_home_top

# Scroll down to see all home content
- swipe:
    start: "50%, 80%"
    end: "50%, 20%"
    duration: 500
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: day1_02_home_scroll1

# Continue scrolling
- swipe:
    start: "50%, 80%"
    end: "50%, 20%"
    duration: 500
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: day1_03_home_scroll2

# Continue scrolling
- swipe:
    start: "50%, 80%"
    end: "50%, 20%"
    duration: 500
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: day1_04_home_scroll3

# Continue scrolling to bottom
- swipe:
    start: "50%, 80%"
    end: "50%, 20%"
    duration: 500
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: day1_05_home_bottom

# Scroll back to top
- swipe:
    start: "50%, 20%"
    end: "50%, 80%"
    duration: 500
- swipe:
    start: "50%, 20%"
    end: "50%, 80%"
    duration: 500
- swipe:
    start: "50%, 20%"
    end: "50%, 80%"
    duration: 500
- swipe:
    start: "50%, 20%"
    end: "50%, 80%"
    duration: 500
- waitForAnimationToEnd:
    timeout: 2000

# Tap on flex meals card to see flex details
- tapOn:
    text: ".*flex.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: day1_06_flex_screen

# Go back
- tapOn:
    point: "30, 60"
- waitForAnimationToEnd:
    timeout: 2000

# Tap on the Fuel Score ring to see weekly details
- tapOn:
    text: ".*ELITE.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: day1_07_fuel_weekly

# Go back to home
- tapOn:
    point: "30, 60"
- waitForAnimationToEnd:
    timeout: 2000

# Tap on a meal from Today's Plan
- tapOn:
    text: ".*Chicken Sausage.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: day1_08_meal_detail

# Go back
- tapOn:
    point: "30, 60"
- waitForAnimationToEnd:
    timeout: 2000
