appId: host.exp.Exponent
---
# Select goal and continue through remaining onboarding

- tapOn:
    text: ".*Maintain.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 1000

- tapOn: "Continue"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: after_goal

# Keep progressing through remaining screens
- repeat:
    times: 20
    commands:
      - tapOn:
          text: ".*No.*"
          optional: true
      - tapOn:
          text: ".*None.*"
          optional: true
      - tapOn:
          text: ".*Maintain.*"
          optional: true
      - tapOn:
          text: "Continue"
          optional: true
      - tapOn:
          text: "Skip"
          optional: true
      - tapOn:
          text: ".*Start.*"
          optional: true
      - tapOn:
          text: ".*Done.*"
          optional: true
      - tapOn:
          text: ".*Finish.*"
          optional: true
      - tapOn:
          text: ".*go.*"
          optional: true
      - tapOn:
          text: "Not Now"
          optional: true
      - tapOn:
          text: "Allow"
          optional: true
      - tapOn:
          text: ".*close.*"
          optional: true
      - waitForAnimationToEnd:
          timeout: 2000

- takeScreenshot: after_all_onboarding
