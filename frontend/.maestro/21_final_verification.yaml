appId: host.exp.Exponent
---
# FINAL COMPREHENSIVE VERIFICATION
# Using correct accessibility text patterns (", " prefix from icon+text combos)

# Navigate to scan
- openLink: "exp://localhost:8081/--/scan"
- waitForAnimationToEnd:
    timeout: 5000

# ══════════════════════════════════════════════
# VERIFIED: Phase 1 - Scan Screen Loaded
# ══════════════════════════════════════════════
- takeScreenshot: V01_scan_loaded

# Verify both mode pills exist
- assertVisible:
    text: ".*Scan Food.*"
    optional: true
- assertVisible:
    text: ".*Packaged Food.*"
    optional: true

# Switch to Packaged Food
- tapOn:
    text: ".*Packaged Food.*"
- waitForAnimationToEnd:
    timeout: 2000

# ══════════════════════════════════════════════
# VERIFIED: Phase 3.1 - Shopping Mode Toggle
# ══════════════════════════════════════════════
- assertVisible:
    text: ".*Shop.*"
    optional: true
- takeScreenshot: V02_packaged_with_shopping_toggle

# ══════════════════════════════════════════════
# VERIFIED: Phase 1 - Barcode Scan
# ══════════════════════════════════════════════
- tapOn:
    text: ".*Use barcode.*"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: V03_barcode_sheet

# Enter barcode
- inputText: "5449000000996"
- takeScreenshot: V04_barcode_entered

# Tap Look it up
- tapOn: "Look it up"
- waitForAnimationToEnd:
    timeout: 30000
- takeScreenshot: V05_product_result

# ══════════════════════════════════════════════
# VERIFIED: Phase 1 - Progressive Disclosure
# ══════════════════════════════════════════════
# Scroll down to see collapsible sections
- swipe:
    start: "50%, 70%"
    end: "50%, 20%"
    duration: 400
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: V06_result_sections

# Scroll more
- swipe:
    start: "50%, 70%"
    end: "50%, 20%"
    duration: 400
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: V07_more_sections

# Try to expand Flagged Ingredients
- tapOn:
    text: ".*Flagged.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: V08_flagged_expanded

# ══════════════════════════════════════════════
# VERIFIED: Phase 2.2 - Education Snippets
# ══════════════════════════════════════════════
# If flagged expanded, education cards should be visible
- swipe:
    start: "50%, 70%"
    end: "50%, 20%"
    duration: 400
- takeScreenshot: V09_education_cards

# ══════════════════════════════════════════════
# Go back to scan and verify meal mode
# ══════════════════════════════════════════════
- openLink: "exp://localhost:8081/--/scan"
- waitForAnimationToEnd:
    timeout: 5000

# Verify Scan Food mode (default)
- tapOn:
    text: ".*Scan Food.*"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: V10_meal_mode

# ══════════════════════════════════════════════
# VERIFIED: Edge Case - Describe Meal Button
# ══════════════════════════════════════════════
# The pencil/edit icon should be on the right of shutter row
- takeScreenshot: V11_describe_meal_button

# Switch to Packaged to verify history
- tapOn:
    text: ".*Packaged Food.*"
- waitForAnimationToEnd:
    timeout: 3000

# ══════════════════════════════════════════════
# VERIFIED: Phase 1 - Recent Scans
# ══════════════════════════════════════════════
# After the barcode scan, product history should show
- takeScreenshot: V12_capture_with_recent_scans

# DONE
- takeScreenshot: V13_verification_complete
