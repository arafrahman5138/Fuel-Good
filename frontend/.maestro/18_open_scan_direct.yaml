appId: host.exp.Exponent
---
# Tap + button and then Scan

- tapOn:
    point: "350,830"
- waitForAnimationToEnd:
    timeout: 2000

# Tap Scan using point coordinates
# Looking at the screenshot, "Scan" is approximately at x=200, y=620
- tapOn:
    point: "200,630"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: scan_opened_direct

# Handle camera permission if asked
- tapOn:
    text: ".*Allow.*"
    optional: true
- tapOn:
    text: ".*Grant.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: scan_ready
