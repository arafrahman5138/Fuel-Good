appId: host.exp.Exponent
---
# Chat Audit 5: Test multiple user scenarios

# Start a new chat
- tapOn:
    point: "270,63"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: scenario_new_chat

# === SCENARIO 1: Dessert healthify ===
- tapOn: "Ask about any food..."
- inputText: "healthy brownie recipe"
- tapOn:
    point: "365,750"
- waitForAnimationToEnd:
    timeout: 45000
- takeScreenshot: scenario_dessert_1

# Scroll to see response
- swipe:
    start: "50%, 60%"
    end: "50%, 15%"
    duration: 400
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: scenario_dessert_2

- swipe:
    start: "50%, 60%"
    end: "50%, 15%"
    duration: 400
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: scenario_dessert_3

