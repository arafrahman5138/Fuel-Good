appId: host.exp.Exponent
---
# Send the message and wait for full response

# Tap the green send button (visible at bottom right of input bar)
- tapOn:
    point: "365,750"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: chat_sent_1

# Wait for AI to respond (can take 15-30s)
- waitForAnimationToEnd:
    timeout: 45000
- takeScreenshot: chat_sent_2

# Scroll down to see the full response
- swipe:
    start: "50%, 60%"
    end: "50%, 15%"
    duration: 400
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: chat_response_a

