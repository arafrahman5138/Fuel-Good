appId: host.exp.Exponent
---
# Fix weight and finish onboarding

# Fix weight - triple tap to select all, then retype
- tapOn: "170170"
- longPressOn: "170170"
- eraseText: 10
- inputText: "170"
- tapOn: "Weight"

# Continue
- tapOn: "Continue"
- waitForAnimationToEnd:
    timeout: 10000
- takeScreenshot: step_after_body

# Keep finishing - select options and continue
- repeat:
    times: 20
    commands:
      - tapOn:
          text: ".*No.*"
          optional: true
      - tapOn:
          text: "Continue"
          optional: true
      - tapOn:
          text: "Skip"
          optional: true
      - tapOn:
          text: ".*Start.*"
          optional: true
      - tapOn:
          text: ".*Done.*"
          optional: true
      - tapOn:
          text: ".*Finish.*"
          optional: true
      - tapOn:
          text: ".*go.*"
          optional: true
      - tapOn:
          text: ".*Explore.*"
          optional: true
      - tapOn:
          text: ".*Not Now.*"
          optional: true
      - tapOn:
          text: ".*Allow.*"
          optional: true
      - tapOn:
          text: ".*Close.*"
          optional: true
      - waitForAnimationToEnd:
          timeout: 2000

- takeScreenshot: truly_final_state
