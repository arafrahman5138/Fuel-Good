appId: host.exp.Exponent
---
# Fix body metrics form and finish onboarding

# Scroll back to top
- swipe:
    start: "50%, 20%"
    end: "50%, 80%"
    duration: 500
- swipe:
    start: "50%, 20%"
    end: "50%, 80%"
    duration: 500

# Clear and fix the height inches field (has "10228" in it)
- tapOn:
    text: "10228"
    optional: true
- eraseText: 20
- inputText: "10"

# Dismiss keyboard by tapping title area
- tapOn:
    point: "187, 80"
- waitForAnimationToEnd:
    timeout: 1000

# Scroll down to activity level
- swipe:
    start: "50%, 80%"
    end: "50%, 30%"
    duration: 500

# Select activity level
- tapOn:
    text: "Lightly active"
- waitForAnimationToEnd:
    timeout: 500

# Select goal
- tapOn:
    text: "Lose body fat"
    optional: true
- waitForAnimationToEnd:
    timeout: 500

- takeScreenshot: "SE_07_body_complete"

# Tap Continue
- tapOn: "Continue"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: "SE_07_generating_plan"

# Wait for plan generation
- waitForAnimationToEnd:
    timeout: 15000
- takeScreenshot: "SE_07_plan_preview"

# Continue through remaining screens
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "See My Plan"
    optional: true
- tapOn:
    text: "View Plan"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: "SE_07_after_plan"

# Scroll
- swipe:
    start: "50%, 80%"
    end: "50%, 30%"
    duration: 500
- takeScreenshot: "SE_07_after_plan_scrolled"

# Handle notifications permission
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Enable Notifications"
    optional: true
- tapOn:
    text: "Not Now"
    optional: true
- tapOn:
    text: "Skip"
    optional: true
- tapOn:
    text: "Allow"
    optional: true
- tapOn:
    text: "Don't Allow"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: "SE_07_notifications"

# Handle paywall
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Start Free Trial"
    optional: true
- tapOn:
    text: "Skip"
    optional: true
- tapOn:
    text: "Not now"
    optional: true
# Try X button (top right corner)
- tapOn:
    point: "355, 55"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: "SE_07_paywall_or_home"

# If still on paywall, try tapping close again
- tapOn:
    point: "355, 40"
    optional: true
- tapOn:
    point: "360, 50"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: "SE_07_final"
