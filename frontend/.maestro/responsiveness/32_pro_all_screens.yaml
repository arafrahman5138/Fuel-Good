# ═══ iPhone 15 Pro - All Screens Test ═══

# ═══ HOME TAB ═══
- takeScreenshot: "PRO_HOME_01_top"
- swipe:
    start: "50%, 75%"
    end: "50%, 20%"
    duration: 500
- takeScreenshot: "PRO_HOME_02_scroll1"
- swipe:
    start: "50%, 75%"
    end: "50%, 20%"
    duration: 500
- takeScreenshot: "PRO_HOME_03_scroll2"
- swipe:
    start: "50%, 75%"
    end: "50%, 20%"
    duration: 500
- takeScreenshot: "PRO_HOME_04_scroll3"
