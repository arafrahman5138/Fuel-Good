- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: "PRO_SETTINGS_01_top"
- swipe:
    start: "50%, 75%"
    end: "50%, 20%"
    duration: 500
- takeScreenshot: "PRO_SETTINGS_02_scroll"
- swipe:
    start: "50%, 75%"
    end: "50%, 20%"
    duration: 500
- takeScreenshot: "PRO_SETTINGS_03_scroll2"
- swipe:
    start: "50%, 75%"
    end: "50%, 20%"
    duration: 500
- takeScreenshot: "PRO_SETTINGS_04_scroll3"

# + Quick Actions button
- tapOn:
    text: ".*Home.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
# Plus button (right side of tab bar)
- tapOn:
    point: "365, 810"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "PRO_QUICKACTIONS_01"

# Dismiss
- tapOn:
    point: "365, 810"
    optional: true
- waitForAnimationToEnd:
