    start: "50%, 75%"
    end: "50%, 20%"
    duration: 500
- takeScreenshot: "PRO_HOME_05_scroll4"
- swipe:
    start: "50%, 75%"
    end: "50%, 20%"
    duration: 500
- takeScreenshot: "PRO_HOME_06_bottom"

# ═══ MEALS TAB ═══
- tapOn:
    text: ".*Meals.*"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: "PRO_MEALS_01_top"
- swipe:
    start: "50%, 75%"
    end: "50%, 20%"
    duration: 500
- takeScreenshot: "PRO_MEALS_02_scroll"

