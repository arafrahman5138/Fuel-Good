appId: host.exp.Exponent
---
# ═══ iPhone 15 Pro Max Full Test ═══

# Dismiss dev menu
- tapOn:
    point: "400, 300"
- waitForAnimationToEnd:
    timeout: 2000

# Screenshot login
- takeScreenshot: "MAX_LOGIN_01_top"
- swipe:
    start: "50%, 80%"
    end: "50%, 30%"
    duration: 500
- takeScreenshot: "MAX_LOGIN_02_bottom"
- swipe:
    start: "50%, 30%"
    end: "50%, 80%"
    duration: 500

# Login
- tapOn:
    text: "you@example.com"
    optional: true
- eraseText: 50
- inputText: "test@fuelgood.dev"
- tapOn:
    text: "Welcome Back"
    optional: true
- waitForAnimationToEnd:
    timeout: 500
- tapOn:
    text: "Enter password"
    optional: true
- eraseText: 50
- inputText: "Test12345"
- tapOn:
    text: "Welcome Back"
    optional: true
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: "MAX_LOGIN_03_filled"

- scrollUntilVisible:
    element: "Sign In"
    direction: DOWN
- tapOn: "Sign In"
- waitForAnimationToEnd:
    timeout: 15000

