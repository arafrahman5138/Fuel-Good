appId: host.exp.Exponent
---
# MAIN VERIFICATION: Navigate to Scan and verify all Phase 1-3 features

# The + button at bottom right should open the scan screen
- tapOn:
    point: "350,820"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: scan_screen_initial

# Verify Phase 1: Capture screen elements
# The scan screen should show "Scan Food" and "Packaged Food" mode pills
- assertVisible:
    text: ".*Scan Food.*"
    optional: true
- assertVisible:
    text: ".*Packaged.*"
    optional: true
- assertVisible:
    text: ".*Fuel Good.*"
    optional: true

# Take a detailed screenshot of the capture screen
- takeScreenshot: verify_capture_screen

# === Phase 3.1: GROCERY STORE MODE ===
# Switch to packaged food mode
- tapOn:
    text: ".*Packaged.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

# Verify shopping mode toggle exists
- takeScreenshot: verify_packaged_mode

# Tap the shopping mode toggle
- tapOn:
    text: ".*Shop.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: verify_shopping_mode

# === Phase 1: BARCODE SCAN TEST ===
# Open barcode sheet
- tapOn:
    text: ".*barcode.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: verify_barcode_sheet

# Type a barcode (Coca-Cola)
- inputText: "5449000000996"
- takeScreenshot: verify_barcode_entered

# Tap Look it up
- tapOn:
    text: ".*Look.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 20000
- takeScreenshot: verify_barcode_result

# === Phase 2.2: EDUCATION + PROGRESSIVE DISCLOSURE ===
# Check for Flagged Ingredients collapsible section
- tapOn:
    text: ".*Flagged.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: verify_flagged_expanded

# === Phase 3.1: COMPARE BUTTON IN SHOPPING MODE ===
# Check if Compare & Scan Next button appears
- takeScreenshot: verify_shopping_result

# Go back to scan another
- tapOn:
    text: ".*Scan another.*"
    optional: true
- tapOn:
    text: ".*another.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# === SWITCH TO MEAL MODE ===
- tapOn:
    text: ".*Scan Food.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

# === EDGE CASE: DESCRIBE MEAL ===
# Look for the describe meal button (pencil icon on right side of shutter)
- takeScreenshot: verify_meal_mode_with_describe

# Take final screenshot
- takeScreenshot: verification_complete
