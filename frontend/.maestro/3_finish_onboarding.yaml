appId: host.exp.Exponent
---
# Flow 3: Finish interactive onboarding

# "What brought you here?" - select an option
- tapOn:
    text: "I want more energy"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "Continue"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: onb_after_goals

# Keep tapping through onboarding - select any first option and Continue
- tapOn:
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 1000

# Try various onboarding buttons
- repeat:
    times: 15
    commands:
      - tapOn:
          text: "Continue"
          optional: true
      - waitForAnimationToEnd:
          timeout: 2000
      - tapOn:
          text: "Skip"
          optional: true
      - tapOn:
          text: "Next"
          optional: true
      - tapOn:
          text: "Get Started"
          optional: true
      - tapOn:
          text: "Finish"
          optional: true
      - tapOn:
          text: "Done"
          optional: true
      - tapOn:
          text: "Not Now"
          optional: true
      - tapOn:
          text: "Maybe Later"
          optional: true
      - tapOn:
          text: "Allow"
          optional: true

- takeScreenshot: onb_final_state
