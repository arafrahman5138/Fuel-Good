    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: onboarding_step3

- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

- tapOn:
