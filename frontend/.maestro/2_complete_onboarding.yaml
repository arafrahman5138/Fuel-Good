appId: host.exp.Exponent
---
# Flow 2: Dismiss password dialog + complete onboarding

# Dismiss the "Save Password?" system dialog
- tapOn:
    text: "Not Now"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Take screenshot
- takeScreenshot: onboarding_step1

# Tap Continue through onboarding screens (multiple times)
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: onboarding_step2

